<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comet Bounce</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="300" height="340"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Key positions
const LEFT_X   = 90;
const RIGHT_X  = 210;
const BOUNCE_Y = 248;   // y of ground contact
const PEAK_Y   = 78;    // arc peak y
const BALL_R   = 12;    // base ball radius
const CYCLE    = 850;   // ms per half-arc

// ── State
let startTime = null;
let ripples = [];
const RIPPLE_DURATION = 620;

// ── Squash / Stretch
// t=0: just launched (residual squash snapping out)
// t=0.5: mid-flight (slight vertical stretch)
// t=1: impact (maximum horizontal squash)
function getSquash(t) {
  const impactApproach = Math.max(0, (t - 0.82) / 0.18); // 0→1 as t approaches 1
  const justLaunched   = Math.max(0, 1 - t / 0.15);      // 1→0 in first 15% of arc
  const squashFactor   = Math.max(impactApproach, justLaunched);
  const midStretch     = (1 - squashFactor) * 0.15;
  return {
    scaleX: 1 + squashFactor * 0.80,
    scaleY: 1 - squashFactor * 0.50 + midStretch * (1 - squashFactor)
  };
}

// ── Background
function drawBackground() {
  const r = 22;
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(W - r, 0); ctx.quadraticCurveTo(W, 0, W, r);
  ctx.lineTo(W, H - r); ctx.quadraticCurveTo(W, H, W - r, H);
  ctx.lineTo(r, H);     ctx.quadraticCurveTo(0, H, 0, H - r);
  ctx.lineTo(0, r);     ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();
}

// ── Water ripple lines
// On impact: a short line (~8px wide) instantly appears at full brightness,
// then rapidly expands outward to ~72px while fading to nothing over 620ms.
// The line also thins in height (5px → 1.5px) as it spreads, like a water surface ring.
function drawRipples(ts) {
  ripples = ripples.filter(r => (ts - r.startTs) < RIPPLE_DURATION);
  for (const r of ripples) {
    const progress = (ts - r.startTs) / RIPPLE_DURATION; // 0 → 1
    const currentW = 8 + (72 - 8) * Math.pow(progress, 0.45);
    const currentH = 5 - 3.5 * Math.pow(progress, 0.5);
    const opacity  = Math.pow(1 - progress, 1.4);
    const lineY    = BOUNCE_Y + BALL_R * 0.45 - currentH / 2;

    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.roundRect(r.x - currentW / 2, lineY, currentW, Math.max(currentH, 0.5), currentH / 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Ball (no glow — solid white circle only)
function drawBall(bx, by, scaleX, scaleY) {
  ctx.save();
  ctx.translate(bx, by);
  ctx.scale(scaleX, scaleY);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, 0, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── Main loop
function render(ts) {
  if (!startTime) startTime = ts;
  const totalT    = (ts - startTime) / CYCLE;
  const halfIdx   = Math.floor(totalT);
  const t         = totalT - halfIdx;           // 0→1 within this half-arc
  const goingRight = (halfIdx % 2) === 0;

  const fromX = goingRight ? LEFT_X  : RIGHT_X;
  const toX   = goingRight ? RIGHT_X : LEFT_X;
  const bx    = fromX + (toX - fromX) * t;
  const by    = BOUNCE_Y - (BOUNCE_Y - PEAK_Y) * 4 * t * (1 - t);
  const { scaleX, scaleY } = getSquash(t);

  // Spawn ripple once per half-arc (at t≈0, ball just landed at fromX)
  if (t < 0.02 && render._lastHalf !== halfIdx) {
    render._lastHalf = halfIdx;
    ripples.push({ startTs: ts, x: fromX });
  }

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawRipples(ts);
  drawBall(bx, by, scaleX, scaleY);
  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
